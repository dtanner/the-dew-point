# XcodeGen project definition. The .xcodeproj is generated from this file and is
# git-ignored — run `just generate` after cloning or changing this file. Keeping
# the project declarative here avoids pbxproj merge conflicts.
name: TheDewPoint

options:
  bundleIdPrefix: com.dantanner
  createIntermediateGroups: true
  deploymentTarget:
    watchOS: "26.0"
    iOS: "26.0"

settings:
  base:
    DEVELOPMENT_TEAM: 72SPM7GVK7
    # Explicit so the new complication target also goes through automatic
    # provisioning — otherwise Xcode falls back to a generic wildcard profile that
    # doesn't include the watch (and isn't WeatherKit-capable) and the device build
    # fails. `just deploy` passes -allowProvisioningUpdates to register the new App ID.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1.3"
    CURRENT_PROJECT_VERSION: "6"

packages:
  DewPoint:
    path: .

# XcodeGen doesn't auto-generate a scheme for the watchapp2-container product
# type, so `just release` gets an explicit one.
schemes:
  TheDewPointContainer:
    build:
      targets:
        TheDewPointContainer: all
    archive:
      config: Release

targets:
  # Stub iOS container — the unit App Store Connect actually distributes. Watch-only
  # apps ship as an executable-less iOS shell with the watch app embedded under
  # Watch/ (Apple's own watch-only template shape). Required because Xcode 26 has a
  # known bug (FB22730778) where bare watchOS archives never offer the
  # app-store-connect export method. `just release` archives THIS target.
  TheDewPointContainer:
    type: application.watchapp2-container
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.dewpoint
        PRODUCT_NAME: TheDewPoint
    info:
      path: Container/Info.plist
      properties:
        CFBundleDisplayName: The Dew Point
        # Must match the embedded watch app's version or validation rejects it.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Only exempt encryption (HTTPS) — answers the export-compliance question
        # so TestFlight builds don't sit in "Missing Compliance".
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - target: TheDewPoint

  TheDewPoint:
    type: application
    platform: watchOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.dewpoint.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: App/Info.plist
      properties:
        # Marks this as a single-target (watch-only) watchOS app. WKApplication
        # satisfies the modern install path; WKWatchOnly satisfies the legacy
        # WatchKit validator, which still runs and rejects the app without it.
        WKApplication: true
        WKWatchOnly: true
        CFBundleDisplayName: The Dew Point
        # Versions come from the build settings above, bumped by `just release`.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: The Dew Point uses your location to fetch the local temperature and dew point.
    entitlements:
      path: App/TheDewPoint.entitlements
      properties:
        com.apple.developer.weatherkit: true
        # Shared storage so the app can hand its latest reading to the complication.
        com.apple.security.application-groups:
          - group.com.dantanner.dewpoint
    dependencies:
      - package: DewPoint
        product: ThermalComfort
      - package: DewPoint
        product: WeatherData
      # Embeds the complication extension so it ships (and deploys) with the app.
      - target: DewPointComplication

  # WidgetKit extension hosting the two complications. Reuses the same packages as
  # the app and fetches its own conditions on a timeline (see ComfortProvider).
  DewPointComplication:
    type: app-extension
    platform: watchOS
    sources:
      - Complication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.dewpoint.watchkitapp.widget
    info:
      path: Complication/Info.plist
      properties:
        CFBundleDisplayName: The Dew Point
        # Must match the app's version or App Store validation rejects the build.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Complication/DewPointComplication.entitlements
      properties:
        com.apple.developer.weatherkit: true
        # Same group as the app — this is how the widget reads the app's reading.
        com.apple.security.application-groups:
          - group.com.dantanner.dewpoint
    dependencies:
      - package: DewPoint
        product: ThermalComfort
      - package: DewPoint
        product: WeatherData
